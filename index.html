  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #111;
    }

    body {
      overflow: hidden;
    }

    #pdf-container {
      width: 100%;
      height: 100%;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #pdf-container::-webkit-scrollbar {
      display: none;
    }

    #pdf-stage {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
    }

    #pdf-canvas {
      position: absolute;
      image-rendering: auto;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    #pdf-status {
      position: fixed;
      inset: auto 1rem 1rem auto;
      padding: 0.5rem 0.75rem;
      color: #f3efe6;
      background: rgba(17, 17, 17, 0.8);
      font: 500 0.875rem/1.2 sans-serif;
      letter-spacing: 0.02em;
      border-radius: 999px;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    #pdf-status.is-visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="pdf-container" aria-label="LaRosmarina brochure viewer">
    <div id="pdf-stage">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>
  <div id="pdf-status" role="status" aria-live="polite">Loading PDF</div>

  <script>
    const pdfContainer = document.getElementById("pdf-container");
    const pdfStage = document.getElementById("pdf-stage");
    const pdfCanvas = document.getElementById("pdf-canvas");
    const pdfStatus = document.getElementById("pdf-status");
    const portraitMobileQuery = window.matchMedia("(max-width: 767px) and (orientation: portrait)");

    let pdfDoc;
    let renderTask;
    let resizeTimer;

    function setStatus(message, isVisible) {
      pdfStatus.textContent = message;
      pdfStatus.classList.toggle("is-visible", Boolean(isVisible));
    }

    function centerCanvas(renderWidth, renderHeight) {
      const stageWidth = Math.max(pdfContainer.clientWidth, renderWidth);
      const stageHeight = Math.max(pdfContainer.clientHeight, renderHeight);

      pdfStage.style.width = `${stageWidth}px`;
      pdfStage.style.height = `${stageHeight}px`;
      pdfCanvas.style.left = `${(stageWidth - renderWidth) / 2}px`;
      pdfCanvas.style.top = `${(stageHeight - renderHeight) / 2}px`;

      pdfContainer.scrollLeft = Math.max(0, (stageWidth - pdfContainer.clientWidth) / 2);
      pdfContainer.scrollTop = Math.max(0, (stageHeight - pdfContainer.clientHeight) / 2);
    }

    async function renderPdfPage() {
      if (!pdfDoc) {
        return;
      }

      if (renderTask) {
        renderTask.cancel();
      }

      const page = await pdfDoc.getPage(1);
      const baseViewport = page.getViewport({ scale: 1 });
      const fitByHeight = portraitMobileQuery.matches;
      const scale = fitByHeight
        ? pdfContainer.clientHeight / baseViewport.height
        : pdfContainer.clientWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });
      const outputScale = window.devicePixelRatio || 1;
      const context = pdfCanvas.getContext("2d");

      pdfCanvas.width = Math.floor(viewport.width * outputScale);
      pdfCanvas.height = Math.floor(viewport.height * outputScale);
      pdfCanvas.style.width = `${viewport.width}px`;
      pdfCanvas.style.height = `${viewport.height}px`;

      context.setTransform(outputScale, 0, 0, outputScale, 0, 0);
      centerCanvas(viewport.width, viewport.height);

      renderTask = page.render({
        canvasContext: context,
        viewport
      });

      try {
        await renderTask.promise;
        setStatus("", false);
      } catch (error) {
        if (error?.name !== "RenderingCancelledException") {
          setStatus("Unable to render PDF", true);
          throw error;
        }
      }
    }

    async function initPdfViewer() {
      try {
        setStatus("Loading PDF", true);
        const pdfjsLib = await import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs");

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";

        pdfDoc = await pdfjsLib.getDocument("background.pdf").promise;
        await renderPdfPage();
      } catch (error) {
        setStatus("Unable to load PDF", true);
        console.error(error);
      }
    }

    function handleResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderPdfPage();
      }, 120);
    }

    initPdfViewer();
    portraitMobileQuery.addEventListener("change", handleResize);
    window.addEventListener("resize", handleResize);
  </script>
</body>
