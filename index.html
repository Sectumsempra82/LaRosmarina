    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
      }

      body {
        min-height: 100vh;
        position: relative;
        isolation: isolate;
        background-color: #ffffff;
        --logo-width: 40vw;
      }

      body::before {
        content: "";
        position: fixed;
        inset: clamp(3rem, 6vw, 5rem);
        background-color: transparent;
        background-image: url("./bg4.png");
        background-position: top left;
        background-repeat: repeat;
        background-size: 12.5vw auto;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .accent-stage {
        position: fixed;
        inset: clamp(3rem, 6vw, 5rem);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: -2;
        pointer-events: none;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      body.decor-ready::before,
      body.decor-ready .accent-stage {
        opacity: 1;
      }

      .stage {
        position: fixed;
        inset: clamp(3rem, 6vw, 5rem);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-lockup {
        width: var(--logo-width);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1rem, 1.8vw, 1.5rem);
      }

      .hero {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-accent {
        width: 46vw;
        aspect-ratio: 3 / 2;
        background: #205356;
      }

      .hero-logo {
        position: relative;
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
        z-index: 1;
      }

      .hero-copy {
        width: 75%;
        margin: 0;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        font-size: calc(var(--logo-width) * 0.0275);
        font-weight: 200;
        line-height: 1.2;
        letter-spacing: 0.12em;
        text-align: center;
      }

      .hero-copy span {
        display: block;
      }

      @media (max-width: 900px) {
        body {
          --logo-width: 70vw;
        }

        body::before {
          inset: clamp(1rem, 6vw, 2rem);
          background-size: min(14rem, 44vw) auto;
        }

        .accent-stage {
          inset: clamp(1rem, 6vw, 2rem);
        }

        .stage {
          inset: clamp(1rem, 6vw, 2rem);
        }

        .hero-accent {
          width: 78vw;
          aspect-ratio: 3 / 4;
        }

        .hero-copy {
          font-size: calc(var(--logo-width) * 0.04125);
        }
      }
    </style>
    <script>
      function loadDecor() {
        const decorImage = new Image();
        decorImage.src = "./bg4.png";
        decorImage.decode?.().catch(() => {});
        decorImage.onload = () => {
          document.body.classList.add("decor-ready");
        };
        decorImage.onerror = () => {
          document.body.classList.add("decor-ready");
        };
      }

      window.addEventListener("load", () => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(loadDecor, { timeout: 300 });
        } else {
          setTimeout(loadDecor, 120);
        }
      });
    </script>
  </head>
  <body>
    <div class="accent-stage" aria-hidden="true">
      <div class="hero-accent"></div>
    </div>
    <main class="stage">
      <section class="brand-lockup" aria-label="LaRosmarina">
        <div class="hero">
          <img
            class="hero-logo"
            src="./full_logo4.svg"
            alt="LaRosmarina"
            loading="eager"
            decoding="async"
            fetchpriority="high" />
        </div>
        <p class="hero-copy">
          <span>STIAMO COLTIVANDO IL VOSTRO</span>
          <span>OLIO EXTRA VERGINE NEL CUORE</span>
          <span>DELLA MAREMMA.</span>
          <span>RIGOROSAMENTE BIOLOGICO</span>
        </p>
      </section>
    </main>
  </body>
